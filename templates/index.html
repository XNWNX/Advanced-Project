<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City - Report an Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Smart City Portal</span>
            <div class="text-white">
                Logged in as: <strong>{{ username }}</strong> |
                <a href="/logout" class="btn btn-sm btn-outline-light ms-2">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Report a City Issue</h3>

                        <form action="/upload" method="POST" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label for="description" class="form-label">Issue Description:</label>
                                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Example: Open manhole, damaged road, uncollected garbage..." required></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="photo" class="form-label">Upload Photo:</label>
                                <input class="form-control" type="file" id="photo" name="photo" accept="image/*" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Submit Report</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

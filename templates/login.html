<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart City - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show m-0 text-center rounded-0 shadow-sm" style="border: none;" role="alert">
                <strong>System Message:</strong> {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Select Your Portal</h3>

                    <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" id="citizen-tab" data-bs-toggle="pill" data-bs-target="#citizen" type="button" role="tab">👤 Citizen</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="staff-tab" data-bs-toggle="pill" data-bs-target="#staff" type="button" role="tab">🏛️ Akimat Staff</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="loginTabsContent">

                        <div class="tab-pane fade show active" id="citizen" role="tabpanel">
                            <h5 class="text-center text-muted mb-3">Resident Login</h5>
                            <form action="/login" method="POST">
                                <input type="hidden" name="login_type" value="citizen">
                                <div class="mb-3">
                                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login to Citizen Portal</button>
                            </form>
                            <div class="text-center mt-3">
                                <a href="/register" class="text-decoration-none">Don't have an account? Register here</a>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="staff" role="tabpanel">
                            <h5 class="text-center text-muted mb-3">Authorized Personnel Only</h5>
                            <form action="/login" method="POST">
                                <input type="hidden" name="login_type" value="staff">
                                <div class="mb-3">
                                    <input type="text" name="username" class="form-control" placeholder="Staff ID / Username" required>
                                </div>
                                <div class="mb-3">
                                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                                </div>
                                <button type="submit" class="btn btn-dark w-100">Login to Akimat Dashboard</button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
